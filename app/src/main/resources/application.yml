server:
  port: 8080

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

spring:
  application:
    name: africa-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  data:
    web:
      pageable:
        max-page-size: 100
        default-page-size: 20
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/africe}
      auto-index-creation: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# Springdoc OpenAPI / Swagger UI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:change-me-in-local-yml}
  access-token-expiration: 900000    # 15 minutes
  refresh-token-expiration: 604800000 # 7 days

# AWS S3 Configuration
aws:
  s3:
    bucket: ${AWS_S3_BUCKET:africa-shop-dev}
    region: ${AWS_S3_REGION:eu-central-1}
  access-key: ${AWS_ACCESS_KEY:}
  secret-key: ${AWS_SECRET_KEY:}

# Telegram Bot Configuration
telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
    chat-ids: ${TELEGRAM_CHAT_IDS:}

# Resilience4j Circuit Breaker
resilience4j:
  circuitbreaker:
    instances:
      telegram:
        failure-rate-threshold: 50
        minimum-number-of-calls: 3
        wait-duration-in-open-state: 30s
        sliding-window-size: 5
      novaPoshta:
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 60s
        sliding-window-size: 10

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Nova Poshta
nova-poshta:
  api-key: ${NOVA_POSHTA_API_KEY:}
  base-url: https://api.novaposhta.ua/v2.0/json/

# Product Seed
seed:
  enabled: ${SEED_ENABLED:true}
  products-path: ${SEED_PRODUCTS_PATH:}

# Logging
logging:
  level:
    com.africe.backend: DEBUG
    org.springframework.data.mongodb: INFO
